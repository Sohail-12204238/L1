server:
  port: 8080

spring:
  application:
    name: NOTIFICATION-SERVICE

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

  datasource:
    url: jdbc:mysql://notification-db:3306/notifications_db?createDatabaseIfNotExist=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: sohail.rcom4@gmail.com
    password: YOUR_APP_PASSWORD   # move this to env variable
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cloud:
    compatibility-verifier:
      enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
  instance:
    hostname: notification-service

management:
  endpoints:
    web:
      exposure:
        include: "*"

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans   # remove if not using zipkin

springdoc:
  api-docs:
    path: /v3/api-docs